  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAS Transport - منصة النقل الذكية</title>
    <meta name="description" content="SAS Transport - أسرع وأسهل طريقة لإدارة شحناتك ونقل بضائعك" />
    
    <!-- 🖼️ الأيقونة الجديدة PNG -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png?v=2">

    <!-- خط القاهرة للفخامة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap" rel="stylesheet">
    
    <style>
      body { 
        font-family: 'Cairo', sans-serif; 
        margin: 0;
        background-color: #f8fafc;
      }
    </style>

    <!-- OneSignal SDK - نظام التنبيهات الاحترافي -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      window.OneSignalDeferred.push(async function(OneSignal) {
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') return;
        await OneSignal.init({
          appId: "79ca45f2-a2b2-4135-8a83-11e3e9f8b5a8",
          allowLocalhostAsSecureOrigin: true,
          autoResubscribe: true,
          
          promptOptions: {
            slidedown: {
              prompts: [{
                type: "push",
                autoPrompt: true,
                text: {
                  actionMessage: "حابب نبعتلك تنبيهات عن الشحنات الجديدة؟",
                  acceptButton: "تفعيل التنبيهات",
                  cancelButton: "ليس الآن"
                },
                delay: {
                  pageViews: 1,
                  timeDelay: 10 
                }
              }]
            }
          },

          welcome_notification: {
            "title": "SAS Transport 🚀",
            "message": "شكراً لانضمامك إلينا. ستصلك تحديثات رحلاتك وشحناتك لحظة بلحظة وبكل دقة",
            "enabled": true
          },

          notifyButton: {
            enable: true,
            displayPredicate: () => OneSignal.Notifications.permission !== "granted",
            position: 'bottom-right',
            size: 'medium',
            colors: {
              'circle.background': '#2563eb', 
            },
            text: {
              'tip.state.unsubscribed': 'اشترك في التنبيهات',
              'message.prenotify': 'انقر لتفعيل تنبيهات الشحنات',
              'message.action.subscribed': 'شكراً للاشتراك!',
              'dialog.main.title': 'إدارة تنبيهات SAS',
              'dialog.main.button.subscribe': 'اشتراك الآن',
              'dialog.main.button.unsubscribe': 'إلغاء الاشتراك'
            }
          },
        });
      });
    </script>

    <!-- أداة الفحص للموبايل (Eruda) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init({
          theme: 'dark',
          defaults: {
              displaySize: 50,
              transparency: 0.9,
              theme: 'Monokai'
          }
      });
    </script>
