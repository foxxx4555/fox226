  <!-- OneSignal SDK - نظام التنبيهات الاحترافي -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function (OneSignal) {
      const hostname = window.location.hostname;
      if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === 'sasgoo.com' || hostname === 'www.sasgoo.com') {
        // Continue initialization
      } else {
        return;
      }
      await OneSignal.init({
        appId: "79ca45f2-a2b2-4135-8a83-11e3e9f8b5a8",
        allowLocalhostAsSecureOrigin: true,
        autoResubscribe: true,

        promptOptions: {
          slidedown: {
            prompts: [{
              type: "push",
              autoPrompt: true,
              text: {
                actionMessage: "حابب نبعتلك تنبيهات عن الشحنات الجديدة؟",
                acceptButton: "تفعيل التنبيهات",
                cancelButton: "ليس الآن"
              },
              delay: {
                pageViews: 1,
                timeDelay: 10
              }
            }]
          }
        },

        welcome_notification: {
          "title": "SAS Transport 🚀",
          "message": "شكراً لانضمامك إلينا. ستصلك تحديثات رحلاتك وشحناتك لحظة بلحظة وبكل دقة",
          "enabled": true
        },

        notifyButton: {
          enable: true,
          displayPredicate: () => OneSignal.Notifications.permission !== "granted",
          position: 'bottom-right',
          size: 'medium',
          colors: {
            'circle.background': '#2563eb',
          },
          text: {
            'tip.state.unsubscribed': 'اشترك في التنبيهات',
            'message.prenotify': 'انقر لتفعيل تنبيهات الشحنات',
            'message.action.subscribed': 'شكراً للاشتراك!',
            'dialog.main.title': 'إدارة تنبيهات SAS',
            'dialog.main.button.subscribe': 'اشتراك الآن',
            'dialog.main.button.unsubscribe': 'إلغاء الاشتراك'
          }
        },
      });
    });
  </script>

  <!-- نظام تصحيح أخطاء ذكي وآمن (Eruda) -->
  <script>
    (function () {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const hostname = window.location.hostname;

        // تفعيل للأجهزة المحلية (Local Network) أو بوجود پارامتر ?debug=true
        const isLocal = hostname === 'localhost' ||
          hostname === '127.0.0.1' ||
          hostname.startsWith('192.168.') ||
          hostname.startsWith('10.') ||
          hostname.endsWith('.local');

        if (urlParams.get('debug') !== 'true' && !isLocal) return;

        console.log("🛠️ Preparing Eruda...");

        var script = document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/eruda";
        // استخدام document.head لأن body قد لا يكون جاهزاً بعد
        (document.head || document.documentElement).appendChild(script);

        script.onload = function () {
          eruda.init({
            theme: 'Monokai',
            defaults: {
              displaySize: 45,
              transparency: 0.9,
              theme: 'Monokai'
            }
          });
          console.log("🚀 Eruda DevTools Ready!");
        };

        script.onerror = function () {
          console.error("❌ Failed to load Eruda from CDN");
        };
      } catch (e) {
        console.error("Eruda Init Error:", e);
      }
    })();
  </script>
